<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Для Ани❤️</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      overflow:hidden;
      display:flex;
      justify-content:center;
      align-items:center;
      background:
      radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 25%),
      radial-gradient(circle at bottom right, rgba(255,255,255,0.06), transparent 25%),
      linear-gradient(135deg, #111827, #1f2937, #0f172a);
      position:relative;
    }

    .blur{
      position:absolute;
      width:400px;
      height:400px;
      border-radius:50%;
      filter:blur(120px);
      opacity:0.35;
      animation:move 10s infinite alternate ease-in-out;
    }

    .blur1{
      background:#3b82f6;
      top:-100px;
      left:-100px;
    }

    .blur2{
      background:#8b5cf6;
      bottom:-100px;
      right:-100px;
      animation-delay:2s;
    }

    @keyframes move{
      from{
        transform:translate(0,0);
      }
      to{
        transform:translate(60px,40px);
      }
    }

    .card{
      width:90%;
      max-width:520px;
      background:rgba(255,255,255,0.08);
      backdrop-filter:blur(18px);
      border:1px solid rgba(255,255,255,0.1);
      border-radius:30px;
      padding:45px;
      text-align:center;
      color:white;
      z-index:2;
      box-shadow:0 20px 50px rgba(0,0,0,0.35);
      animation:show 0.5s ease;
    }

    @keyframes show{
      from{
        opacity:0;
        transform:translateY(20px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    h1{
      font-size:40px;
      margin-bottom:20px;
      font-weight:700;
    }

    p{
      font-size:22px;
      line-height:1.6;
      color:#e5e7eb;
      margin-bottom:35px;
    }

    .buttons{
      display:flex;
      justify-content:center;
      gap:20px;
      position:relative;
      height:70px;
    }

    button{
      border:none;
      padding:16px 34px;
      border-radius:16px;
      font-size:18px;
      cursor:pointer;
      transition:0.25s;
      position:absolute;
    }

    .yes{
      background:#2563eb;
      color:white;
      left:50%;
      transform:translateX(-120%);
    }

    .yes:hover{
      background:#1d4ed8;
      transform:translateX(-120%) scale(1.07);
    }

    .no{
      background:#374151;
      color:white;
      left:50%;
      transform:translateX(20%);
    }

    .final{
      font-size:26px;
      line-height:1.8;
    }

  </style>
</head>
<body>

<div class="blur blur1"></div>
<div class="blur blur2"></div>

<div class="card" id="card">
  <h1>Аня</h1>

  <p>
    У меня есть один вопрос..
  </p>

  <button class="yes" onclick="nextPage()">
    Какой?
  </button>
</div>

<script>

function nextPage(){
  document.getElementById("card").innerHTML = `
    <h1>Есть предложение</h1>

    <p>
      Пойдешь со мной гулять?<br>
      Только ты и я
    </p>

    <div class="buttons">
      <button class="yes" onclick="accept()">
        Да❤️
      </button>

      <button class="no" id="noBtn">
        Нет😭
      </button>
    </div>
  `;

  const noBtn = document.getElementById("noBtn");

  noBtn.addEventListener("mouseover", () => {
    const x = Math.random() * 250 - 125;
    const y = Math.random() * 120 - 60;

    noBtn.style.transform = `translate(${x}px, ${y}px)`;
  });
}

function accept(){
  document.getElementById("card").innerHTML = `
    <h1>Тогда договорились💞</h1>

    <p class="final">
      Жду тебя 25.06.26<br><br>
      Будет только мы, вечер и хорошая атмосфера🎀🕯️
    </p>
  `;
}

</script>

</body>
</html>
